<!-- Returned by POST /edit-start. Two-panel layout: chat left, preview right. -->

<div class="edit-workspace" id="edit-workspace">

  <!-- ── Left: Chat panel ─────────────────────────────────────── -->
  <div class="edit-chat-panel">
    <div class="edit-panel-header">
      <h3 class="edit-panel-title">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
          <path d="M2 3a1 1 0 011-1h10a1 1 0 011 1v7a1 1 0 01-1 1H9l-3 2v-2H3a1 1 0 01-1-1V3z"
                stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        Chat with the agent
      </h3>
      <span class="edit-status-badge" id="edit-status-badge">Ready</span>
    </div>

    <!-- Message history -->
    <div class="edit-chat-messages" id="chat-messages">
      <div class="chat-bubble agent-bubble">
        <div class="chat-bubble-content">
          <p>Your email is loaded and ready to edit. What would you like to change?</p>
        </div>
      </div>
    </div>

    <!-- Input form -->
    <form class="edit-chat-form" id="chat-form" onsubmit="sendMessage(event)">
      <div class="edit-chat-input-row">
        <textarea
          id="chat-input"
          class="edit-chat-textarea"
          rows="2"
          placeholder="e.g. Change the CTA button to green and update the headline to 'Get started today'"
          onkeydown="handleChatKey(event)"
        ></textarea>
        <button type="submit" class="btn btn-primary edit-send-btn" id="send-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8l12-6-6 12V9L2 8z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <p class="edit-chat-hint">Press <kbd>Ctrl+Enter</kbd> to send &middot; <kbd>Enter</kbd> for new line</p>
    </form>
  </div>

  <!-- ── Right: Preview panel ─────────────────────────────────── -->
  <div class="edit-preview-panel">
    <div class="edit-panel-header">
      <h3 class="edit-panel-title">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
          <rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M1 5h14" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="4" cy="3.5" r=".75" fill="currentColor"/>
          <circle cx="6.5" cy="3.5" r=".75" fill="currentColor"/>
        </svg>
        Live preview
      </h3>
      <div style="display:flex;align-items:center;gap:.5rem;">
        <span class="edit-preview-badge" id="edit-preview-badge">Current version</span>
        <a
          href="/download-template/{{ template_id }}"
          download="email-{{ template_id[:8] }}.json"
          class="btn-outline"
          style="font-size:.75rem;padding:.25rem .65rem;"
        >
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" style="flex-shrink:0">
            <path d="M7 1v8m0 0L4 6m3 3 3-3M1 11h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download JSON
        </a>
      </div>
    </div>
    <div class="edit-preview-wrap" id="edit-preview-outer">
      <div class="edit-iframe-wrap" id="edit-preview">
        {{ initial_preview | safe }}
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  var SESSION_ID = {{ session_id | tojson }};
  var chatMessages = document.getElementById('chat-messages');
  var chatInput    = document.getElementById('chat-input');
  var sendBtn      = document.getElementById('send-btn');
  var statusBadge  = document.getElementById('edit-status-badge');
  var previewBadge = document.getElementById('edit-preview-badge');
  var previewDiv   = document.getElementById('edit-preview');
  var previewOuter = document.getElementById('edit-preview-outer');
  var currentEs    = null;

  /* ── Fix iframe: disable its own scrollbar, make it tall enough ── */
  function fixIframe() {
    var iframe = previewDiv.querySelector('iframe');
    if (!iframe) return;
    iframe.setAttribute('scrolling', 'no');
    iframe.style.height = '3000px';
    iframe.style.overflow = 'hidden';
  }

  fixIframe();

  /* ── Scroll chat to bottom ────────────────────────────────────── */
  function scrollChat() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  /* ── Build DOM elements ───────────────────────────────────────── */
  function createUserBubble(text) {
    var div = document.createElement('div');
    div.className = 'chat-bubble user-bubble';
    var inner = document.createElement('div');
    inner.className = 'chat-bubble-content';
    var p = document.createElement('p');
    p.textContent = text;
    inner.appendChild(p);
    div.appendChild(inner);
    return div;
  }

  function createAgentBubble() {
    var div = document.createElement('div');
    div.className = 'chat-bubble agent-bubble agent-loading';
    var inner = document.createElement('div');
    inner.className = 'chat-bubble-content';
    inner.id = 'agent-typing-' + Date.now();
    inner.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
    div.appendChild(inner);
    return { div: div, inner: inner };
  }

  /* ── Main send function ───────────────────────────────────────── */
  window.sendMessage = function (e) {
    e.preventDefault();
    var msg = chatInput.value.trim();
    if (!msg || sendBtn.disabled) return;

    // Append user bubble
    chatMessages.appendChild(createUserBubble(msg));
    chatInput.value = '';
    scrollChat();

    // Disable input while agent is running
    chatInput.disabled = true;
    sendBtn.disabled = true;
    statusBadge.textContent = 'Thinking…';
    statusBadge.className = 'edit-status-badge is-generating';
    previewBadge.textContent = 'Updating…';

    // Append agent loading bubble
    var agentBubble = createAgentBubble();
    chatMessages.appendChild(agentBubble.div);
    scrollChat();

    // Open SSE stream for this turn
    if (currentEs) { currentEs.close(); currentEs = null; }
    var url = '/edit-stream?session_id=' + encodeURIComponent(SESSION_ID) +
              '&message=' + encodeURIComponent(msg);
    var es = new EventSource(url);
    currentEs = es;

    es.addEventListener('preview', function (ev) {
      previewDiv.innerHTML = ev.data;
      fixIframe();
      // Flash the preview panel
      previewOuter.scrollTop = 0;
      previewOuter.classList.remove('preview-refreshing');
      void previewOuter.offsetWidth;
      previewOuter.classList.add('preview-refreshing');
      previewOuter.addEventListener('animationend', function () {
        previewOuter.classList.remove('preview-refreshing');
      }, { once: true });
    });

    es.addEventListener('agent-message', function (ev) {
      agentBubble.div.classList.remove('agent-loading');
      agentBubble.inner.innerHTML = ev.data;
      scrollChat();
    });

    es.addEventListener('close', function () {
      es.close();
      currentEs = null;
      chatInput.disabled = false;
      sendBtn.disabled = false;
      chatInput.focus();
      statusBadge.textContent = 'Ready';
      statusBadge.className = 'edit-status-badge';
      previewBadge.textContent = 'Updated';
      scrollChat();
    });

    es.onerror = function () {
      es.close();
      currentEs = null;
      if (agentBubble.div.classList.contains('agent-loading')) {
        agentBubble.div.classList.remove('agent-loading');
        agentBubble.inner.innerHTML = '<p class="chat-error">Connection error — please try again.</p>';
      }
      chatInput.disabled = false;
      sendBtn.disabled = false;
      statusBadge.textContent = 'Ready';
      statusBadge.className = 'edit-status-badge';
      scrollChat();
    };
  };

  /* ── Ctrl+Enter to send ───────────────────────────────────────── */
  window.handleChatKey = function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('chat-form').dispatchEvent(new Event('submit'));
    }
  };

  /* Focus input on load */
  chatInput.focus();
})();
</script>
