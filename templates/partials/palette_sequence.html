<!-- Palette result view — returned via SSE "ready" event -->

<style>
  .pal-header { display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; flex-wrap:wrap; }
  .pal-title  { font-size:1.15rem; font-weight:700; color:#26045D; }

  .pal-row { display:flex; gap:1rem; align-items:flex-start; }
  .pal-row--single { max-width: 450px; margin: 0 auto; }

  .pal-col {
    flex: 1;
    min-width: 0;
    border: 2px solid #EAE6F7;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 1px 3px rgba(38,4,93,.06), 0 6px 20px rgba(38,4,93,.08);
    transition: border-color .3s, box-shadow .3s;
  }

  .pal-col.is-styling {
    border-color: #7747FF;
    box-shadow:
      0 0 0 3px rgba(119,71,255,.15),
      0 1px 3px rgba(38,4,93,.06),
      0 6px 20px rgba(38,4,93,.08);
  }

  .pal-col.is-done { border-color: #82EDA8; }

  .pal-col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    padding: .7rem 1rem;
    border-bottom: 1px solid #EAE6F7;
    background: #FAFAF9;
    min-height: 56px;
  }

  .pal-col-info { display:flex; flex-direction:column; gap:.3rem; min-width:0; }

  .pal-col-name {
    font-size: .85rem;
    font-weight: 600;
    color: #26045D;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pal-col-swatches { display:flex; gap:3px; }

  .pal-col-swatch {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,.12);
    flex-shrink: 0;
  }

  .pal-status {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    font-size: .7rem;
    font-weight: 700;
    padding: .28rem .65rem;
    border-radius: 99px;
    white-space: nowrap;
    transition: background .3s, color .3s;
  }

  .pal-status.styling {
    background: rgba(119,71,255,.1);
    color: #7747FF;
  }

  .pal-status.done {
    background: rgba(130,237,168,.25);
    color: #1a7a40;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: blink-dot 1s ease-in-out infinite;
  }

  @keyframes blink-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: .25; }
  }

  .pal-iframe-wrap { width:700px; transform-origin:top left; }
  .pal-iframe-wrap iframe { width:700px; border:none; display:block; }


  .pal-placeholder {
    padding: 4rem 1rem;
    text-align: center;
    color: #6E5F8A;
    font-style: italic;
    font-size: .875rem;
  }
</style>

<section>
  <div class="pal-header">
    <h2 class="pal-title">Palette Variations</h2>
    <span class="plan-badge running">{{ palettes_with_ids | length }} agents in parallel</span>
  </div>

  <div class="pal-row{% if palettes_with_ids | length == 1 %} pal-row--single{% endif %}" id="pal-row">
    {% for palette, template_id in palettes_with_ids %}
    <div
      class="pal-col"
      data-template-id="{{ template_id }}"
      hx-ext="sse"
      sse-connect="/stream-palette/{{ template_id }}?palette_id={{ palette.id }}"
      sse-close="close"
    >
      <div class="pal-col-header">
        <div class="pal-col-info">
          <span class="pal-col-name">{{ palette.name }}</span>
          <div class="pal-col-swatches">
            {% for color in palette.swatches %}
            <span class="pal-col-swatch" style="background:{{ color }}"></span>
            {% endfor %}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem;flex-shrink:0;">
          <span class="pal-status styling">
            <span class="status-dot"></span>Styling&hellip;
          </span>
          <div class="col-dl-bar" style="display:none;gap:.3rem;align-items:center;">
            <a href="/download-template/{{ template_id }}"
               download="email-{{ template_id[:8] }}.json"
               class="btn-outline"
               style="font-size:.72rem;padding:.22rem .55rem;display:inline-flex;align-items:center;gap:.3rem;">
              <svg width="11" height="11" viewBox="0 0 14 14" fill="none">
                <path d="M7 1v8m0 0L4 6m3 3 3-3M1 11h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>JSON
            </a>
            <a href="/download-html/{{ template_id }}"
               download="email-{{ template_id[:8] }}.html"
               class="btn-outline"
               style="font-size:.72rem;padding:.22rem .55rem;display:inline-flex;align-items:center;gap:.3rem;">
              <svg width="11" height="11" viewBox="0 0 14 14" fill="none">
                <path d="M7 1v8m0 0L4 6m3 3 3-3M1 11h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>HTML
            </a>
          </div>
        </div>
      </div>

      <div class="pal-iframe-wrap" sse-swap="preview" hx-swap="innerHTML">
        <div class="pal-placeholder">Waiting for agent&hellip;</div>
      </div>
    </div>
    {% endfor %}
  </div>
</section>

<script>
(function () {

  function scaleWraps() {
    var row = document.getElementById('pal-row');
    if (!row) return;
    row.querySelectorAll('.pal-col').forEach(function (col) {
      var w = col.offsetWidth;
      var scale = w / 700;
      var wrap = col.querySelector('.pal-iframe-wrap');
      if (wrap) {
        wrap.style.transform = 'scale(' + scale + ')';
        wrap.style.height = (800 * scale) + 'px';
      }
    });
  }
  scaleWraps();
  window.addEventListener('resize', scaleWraps);
  document.body.addEventListener('htmx:afterSwap', function () { setTimeout(scaleWraps, 100); });
  document.body.addEventListener('htmx:sseMessage', function (e) {
    setTimeout(scaleWraps, 50);
    var col = e.target && e.target.closest('.pal-col');
    if (!col) return;
    var wrap = col.querySelector('.pal-iframe-wrap');
    if (!wrap) return;
    wrap.classList.remove('preview-refreshing');
    void wrap.offsetWidth;
    wrap.classList.add('preview-refreshing');
    wrap.addEventListener('animationend', function () {
      wrap.classList.remove('preview-refreshing');
    }, { once: true });
  });

  document.body.addEventListener('htmx:sseOpen', function (e) {
    var col = e.target.closest('.pal-col');
    if (col) col.classList.add('is-styling');
  });

  document.body.addEventListener('htmx:sseClose', function (e) {
    var col = e.target.closest('.pal-col');
    if (!col) return;
    col.classList.remove('is-styling');
    col.classList.add('is-done');
    var pill = col.querySelector('.pal-status');
    if (pill) {
      pill.className = 'pal-status done';
      pill.textContent = '✓ Done';
    }
    var dlBar = col.querySelector('.col-dl-bar');
    if (dlBar) dlBar.style.display = 'flex';
  });

})();
</script>
