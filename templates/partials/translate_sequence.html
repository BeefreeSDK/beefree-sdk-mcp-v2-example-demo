<!-- Translation result view — returned via SSE "ready" event -->

<style>
  .trans-header { display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; flex-wrap:wrap; }
  .trans-title  { font-size:1.15rem; font-weight:700; color:#26045D; }

  .trans-row { display:flex; gap:1rem; align-items:flex-start; }

  .trans-col {
    flex: 1;
    min-width: 0;
    border: 2px solid #EAE6F7;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 1px 3px rgba(38,4,93,.06), 0 6px 20px rgba(38,4,93,.08);
    transition: border-color .3s, box-shadow .3s;
  }

  .trans-col.is-translating {
    border-color: #7747FF;
    box-shadow:
      0 0 0 3px rgba(119,71,255,.15),
      0 1px 3px rgba(38,4,93,.06),
      0 6px 20px rgba(38,4,93,.08);
  }

  .trans-col.is-done {
    border-color: #82EDA8;
  }

  .trans-col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    padding: .7rem 1rem;
    border-bottom: 1px solid #EAE6F7;
    background: #FAFAF9;
    min-height: 56px;
  }

  .trans-col-info { display:flex; flex-direction:column; gap:.15rem; min-width:0; }

  .trans-col-label {
    font-size: .62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: #7747FF;
  }

  .trans-col-lang {
    font-size: .85rem;
    font-weight: 600;
    color: #26045D;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .trans-status {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    font-size: .7rem;
    font-weight: 700;
    padding: .28rem .65rem;
    border-radius: 99px;
    white-space: nowrap;
    transition: background .3s, color .3s;
  }

  .trans-status.translating {
    background: rgba(119,71,255,.1);
    color: #7747FF;
  }

  .trans-status.done {
    background: rgba(130,237,168,.25);
    color: #1a7a40;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: blink-dot 1s ease-in-out infinite;
  }

  @keyframes blink-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: .25; }
  }

  .trans-iframe-wrap { width:600px; transform-origin:top left; }
  .trans-iframe-wrap iframe { width:600px; border:none; display:block; }

  .trans-placeholder {
    padding: 4rem 1rem;
    text-align: center;
    color: #6E5F8A;
    font-style: italic;
    font-size: .875rem;
  }
</style>

<section>
  <div class="trans-header">
    <h2 class="trans-title">Translations</h2>
    <span class="plan-badge running">{{ languages_with_ids | length }} agents in parallel</span>
  </div>

  <div class="trans-row" id="trans-row">
    {% for language, template_id in languages_with_ids %}
    <div
      class="trans-col"
      hx-ext="sse"
      sse-connect="/stream-translate/{{ template_id }}?language={{ language | urlencode }}"
      sse-close="close"
    >
      <div class="trans-col-header">
        <div class="trans-col-info">
          <span class="trans-col-label">Language</span>
          <span class="trans-col-lang" title="{{ language }}">{{ language }}</span>
        </div>
        <span class="trans-status translating">
          <span class="status-dot"></span>Translating&hellip;
        </span>
      </div>

      <div class="trans-iframe-wrap" sse-swap="preview" hx-swap="innerHTML">
        <div class="trans-placeholder">Waiting for agent&hellip;</div>
      </div>
    </div>
    {% endfor %}
  </div>
</section>

<script>
(function () {

  function scaleWraps() {
    var row = document.getElementById('trans-row');
    if (!row) return;
    row.querySelectorAll('.trans-col').forEach(function (col) {
      var w = col.offsetWidth;
      var scale = w / 600;
      var wrap = col.querySelector('.trans-iframe-wrap');
      if (wrap) {
        wrap.style.transform = 'scale(' + scale + ')';
        wrap.style.height = (800 * scale) + 'px';
      }
    });
  }
  scaleWraps();
  window.addEventListener('resize', scaleWraps);
  document.body.addEventListener('htmx:afterSwap',  function () { setTimeout(scaleWraps, 100); });
  document.body.addEventListener('htmx:sseMessage', function () { setTimeout(scaleWraps,  50); });

  document.body.addEventListener('htmx:sseOpen', function (e) {
    var col = e.target.closest('.trans-col');
    if (col) col.classList.add('is-translating');
  });

  document.body.addEventListener('htmx:sseClose', function (e) {
    var col = e.target.closest('.trans-col');
    if (!col) return;
    col.classList.remove('is-translating');
    col.classList.add('is-done');
    var pill = col.querySelector('.trans-status');
    if (pill) {
      pill.className = 'trans-status done';
      pill.textContent = '✓ Done';
    }
  });

})();
</script>
