<!-- Returned instantly by POST /generate. SSE drives the live preview. -->

<style>
  .single-result-wrap {
    max-width: 450px;
    margin: 0 auto;
  }

  .single-result-col {
    border: 2px solid #EAE6F7;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 1px 3px rgba(38,4,93,.06), 0 6px 20px rgba(38,4,93,.08);
    transition: border-color .3s, box-shadow .3s;
  }

  .single-result-col.is-generating {
    border-color: #7747FF;
    box-shadow:
      0 0 0 3px rgba(119,71,255,.15),
      0 1px 3px rgba(38,4,93,.06),
      0 6px 20px rgba(38,4,93,.08);
  }

  .single-result-col.is-done { border-color: #82EDA8; }

  .single-result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    padding: .7rem 1rem;
    border-bottom: 1px solid #EAE6F7;
    background: #FAFAF9;
    min-height: 56px;
  }

  .single-result-title {
    font-size: .85rem;
    font-weight: 600;
    color: #26045D;
  }

  .single-gen-status {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    font-size: .7rem;
    font-weight: 700;
    padding: .28rem .65rem;
    border-radius: 99px;
    white-space: nowrap;
    transition: background .3s, color .3s;
  }

  .single-gen-status.generating {
    background: rgba(119,71,255,.1);
    color: #7747FF;
  }

  .single-gen-status.done {
    background: rgba(130,237,168,.25);
    color: #1a7a40;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: blink-dot 1s ease-in-out infinite;
  }

  @keyframes blink-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: .25; }
  }

  .single-preview-panel {
    height: 520px;
    overflow: hidden;
  }

  .single-iframe-wrap { width: 600px; transform-origin: top left; }
  .single-iframe-wrap iframe { width: 600px; border: none; display: block; }

  .single-waiting {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #6E5F8A;
    font-style: italic;
    font-size: .875rem;
  }
</style>

<section class="card">
  <div class="card-header-row">
    <h2 class="card-title">Generated Email</h2>
    <span class="single-gen-status generating" id="single-status-badge">
      <span class="status-dot"></span>Generating&hellip;
    </span>
  </div>

  <div
    class="single-result-wrap"
    hx-ext="sse"
    sse-connect="/generate-stream?brief={{ brief | urlencode }}"
    sse-close="close"
    id="single-gen-card"
  >
    <div class="single-result-col is-generating">
      <div
        class="single-preview-panel"
        id="single-preview"
        sse-swap="preview"
        hx-swap="innerHTML"
      >
        <div class="single-waiting">Agent is starting&hellip;</div>
      </div>
    </div>
  </div>
</section>

<script>
(function () {
  function scalePreview() {
    var wrap = document.querySelector('.single-iframe-wrap');
    if (!wrap) return;
    var panel = document.getElementById('single-preview');
    if (!panel) return;
    var w = panel.offsetWidth;
    var scale = w / 600;
    wrap.style.transform = 'scale(' + scale + ')';
    wrap.style.transformOrigin = 'top left';
  }

  window.addEventListener('resize', scalePreview);
  document.body.addEventListener('htmx:sseMessage', function () { setTimeout(scalePreview, 50); });
  document.body.addEventListener('htmx:afterSwap',  function () { setTimeout(scalePreview, 50); });

  document.body.addEventListener('htmx:sseClose', function () {
    var badge = document.getElementById('single-status-badge');
    if (badge) {
      badge.className = 'single-gen-status done';
      badge.textContent = '✓ Done';
    }
    var col = document.querySelector('.single-result-col');
    if (col) {
      col.classList.remove('is-generating');
      col.classList.add('is-done');
    }
    scalePreview();
  });
})();
</script>
