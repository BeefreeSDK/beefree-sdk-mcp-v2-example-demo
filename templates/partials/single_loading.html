<!-- Returned instantly by POST /generate. SSE drives the live preview. -->

<div
  class="card single-gen-card"
  id="single-gen-card"
  hx-ext="sse"
  sse-connect="/generate-stream?brief={{ brief | urlencode }}"
  sse-close="close"
>

  <div class="card-header-row">
    <div>
      <h2 class="card-title">Generating your email&hellip;</h2>
      <p class="planning-sub">One agent is building a complete email from scratch.</p>
    </div>
    <span class="plan-badge running" id="single-status-badge">
      <span class="status-dot-inline"></span>&nbsp;Generating&hellip;
    </span>
  </div>

  <!-- Preview area — updated by SSE "preview" events -->
  <div
    class="single-preview-area"
    id="single-preview"
    sse-swap="preview"
    hx-swap="innerHTML"
  >
    <div class="single-placeholder">
      <div class="spinner-ring"></div>
      <p class="planning-headline">Agent is starting&hellip;</p>
      <p class="planning-sub">Your email will appear here as the agent builds it.</p>
    </div>
  </div>

</div>

<script>
(function () {
  var IFRAME_H = 1400;

  function scalePreview() {
    var wrap = document.querySelector('.single-iframe-wrap');
    if (!wrap) return;
    var container = document.getElementById('single-preview');
    if (!container) return;
    var w = container.offsetWidth;
    var scale = w / 600;
    wrap.style.transform = 'scale(' + scale + ')';
    // transform doesn't affect layout flow — compensate so the card
    // expands to the visual height and nothing is clipped or empty
    var visualH = IFRAME_H * scale;
    wrap.style.height = IFRAME_H + 'px';
    wrap.style.marginBottom = (visualH - IFRAME_H) + 'px';
  }

  window.addEventListener('resize', scalePreview);
  document.body.addEventListener('htmx:sseMessage', function () { setTimeout(scalePreview, 50); });
  document.body.addEventListener('htmx:afterSwap', function () { setTimeout(scalePreview, 50); });

  document.body.addEventListener('htmx:sseClose', function () {
    var badge = document.getElementById('single-status-badge');
    if (badge) {
      badge.className = 'plan-badge';
      badge.innerHTML = '&#10003;&nbsp;Done';
    }
    var card = document.getElementById('single-gen-card');
    if (card) card.style.borderColor = '#82EDA8';
    scalePreview();
  });
})();
</script>
