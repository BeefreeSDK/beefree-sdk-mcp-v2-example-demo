<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beefree Headless MCP v2 — Sequence Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-brand">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#7747FF"/>
          <path d="M16 6c-2 0-6 2-6 6 0 2 1 3 2 4-1 1-2 3-2 5 0 4 3 7 6 7s6-3 6-7c0-2-1-4-2-5 1-1 2-2 2-4 0-4-4-6-6-6z" fill="#82EDA8"/>
          <circle cx="13" cy="13" r="1.5" fill="#26045D"/>
          <circle cx="19" cy="13" r="1.5" fill="#26045D"/>
        </svg>
        <span class="brand-name">Beefree SDK</span>
        <span class="brand-tag">Headless MCP v2</span>
      </div>
      <p class="header-sub">
        Generate a full email sequence in parallel — no browser required.
      </p>
    </div>
  </header>

  <main class="container">

    <!-- ── Campaign form ── -->
    <section class="card form-card">
      <h2 class="card-title">Design your campaign</h2>

      <form
        hx-post="/plan"
        hx-target="#workspace"
        hx-swap="innerHTML"
        hx-indicator="#spinner"
        class="campaign-form"
      >
        <div class="field full">
          <label for="goal">Campaign brief</label>
          <textarea
            id="goal"
            name="goal"
            rows="6"
            placeholder="Describe your emails — the planner will figure out how many to create.&#10;&#10;e.g. Generate 3 transactional emails for Netflix: account confirmation, password reset, and subscription confirmation…"
            required
          ></textarea>
        </div>

        <div class="field full actions">
          <button type="submit" class="btn btn-primary">
            Generate Sequence
            <span id="spinner" class="htmx-indicator spinner"></span>
          </button>
        </div>
      </form>
    </section>

    <!-- ── Dynamic workspace (plan → execution) ── -->
    <div id="workspace"></div>

  </main>

  <footer class="site-footer">
    <div class="container">
      Powered by <strong>Beefree SDK MCP v2</strong> ·
      <strong>PydanticAI</strong> · <strong>FastAPI</strong>
    </div>
  </footer>

  <script>
    function rescaleThumbs() {
      document.querySelectorAll('.thumb-viewport').forEach(vp => {
        const w = vp.offsetWidth;
        const scale = w / 600;
        const inner = vp.querySelector('.thumb-inner');
        if (inner) inner.style.transform = 'scale(' + scale + ')';
      });
    }
    window.addEventListener('resize', rescaleThumbs);
    document.body.addEventListener('htmx:afterSwap', function() {
      setTimeout(rescaleThumbs, 50);
    });
  </script>

</body>
</html>
