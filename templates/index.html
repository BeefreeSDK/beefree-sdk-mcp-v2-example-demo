<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beefree Headless MCP v2 — Sequence Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-brand">
        <a href="/" class="back-link" aria-label="Back to home">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M11 14L6 9l5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#7747FF"/>
          <path d="M16 6c-2 0-6 2-6 6 0 2 1 3 2 4-1 1-2 3-2 5 0 4 3 7 6 7s6-3 6-7c0-2-1-4-2-5 1-1 2-2 2-4 0-4-4-6-6-6z" fill="#82EDA8"/>
          <circle cx="13" cy="13" r="1.5" fill="#26045D"/>
          <circle cx="19" cy="13" r="1.5" fill="#26045D"/>
        </svg>
        <span class="brand-name">Beefree SDK</span>
        <span class="brand-tag">Email Sequence</span>
      </div>
      <p class="header-sub">
        Generate a full email sequence in parallel — no browser required.
      </p>
    </div>
  </header>

  <main class="container">

    <!-- ── Campaign form ── -->
    <section class="card form-card" id="form-section">
      <div class="card-header-row">
        <h2 class="card-title">Design your campaign</h2>
        <button class="collapse-btn" onclick="toggleCard(this.closest('.card'))" aria-label="Toggle section">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 6l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="card-body">
        <div>
          <form
            hx-post="/plan"
            hx-target="#workspace"
            hx-swap="innerHTML"
            hx-indicator="#spinner"
            onsubmit="return !!document.getElementById('goal').value"
          >
            <input type="hidden" id="goal" name="goal" value="" />
            <input type="hidden" id="preset_id" name="preset_id" value="" />

            <div class="seq-prompt-grid">

              <!-- Preset 1: Streaming service onboarding -->
              <button type="button" class="seq-prompt-card" onclick="selectPrompt(this)" data-preset-id="streaming-onboarding" data-prompt="Generate 3 transactional emails for a premium streaming service (think Netflix): (1) Welcome &amp; account confirmation — warm welcome, highlight top content categories, bold CTA to start watching. (2) Password reset — clear and secure, prominent reset button, expires-in notice. (3) Subscription confirmation — recap the plan name, next billing date, what's included, CTA to explore the catalogue. Brand tone: friendly, modern, premium. Dark branded header, rich imagery placeholders.">
                <div class="seq-prompt-header">
                  <span class="seq-prompt-tag">Transactional · 3 emails</span>
                  <span class="seq-prompt-check">
                    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </span>
                </div>
                <h3 class="seq-prompt-title">Streaming Service Onboarding</h3>
                <p class="seq-prompt-desc">Welcome, password reset, and subscription confirmation for a Netflix-style platform.</p>
              </button>

              <!-- Preset 2: SaaS trial nurture -->
              <button type="button" class="seq-prompt-card" onclick="selectPrompt(this)" data-preset-id="saas-trial-nurture" data-prompt="Generate a 4-email nurture sequence for a B2B SaaS project management tool (think Asana or Monday.com) designed to convert free-trial users into paid subscribers: (1) Trial started — quick-start guide, 3 key features to try, CTA to the dashboard. (2) Day 3 check-in — tips to maximise the trial, links to short tutorial videos. (3) Day 7 feature spotlight — showcase the one premium feature they haven't tried, strong upgrade CTA. (4) Trial ending soon — urgency message, value recap, limited-time discount offer, upgrade CTA. Brand tone: professional, motivating, results-focused. Clean layout with data/metric callouts.">
                <div class="seq-prompt-header">
                  <span class="seq-prompt-tag">Nurture · 4 emails</span>
                  <span class="seq-prompt-check">
                    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </span>
                </div>
                <h3 class="seq-prompt-title">SaaS Trial-to-Paid Nurture</h3>
                <p class="seq-prompt-desc">4-step sequence guiding free-trial users toward upgrading a B2B project management tool.</p>
              </button>

              <!-- Preset 3: E-commerce Black Friday -->
              <button type="button" class="seq-prompt-card" onclick="selectPrompt(this)" data-preset-id="black-friday-fashion" data-prompt="Generate a 3-email Black Friday campaign for a premium fashion e-commerce brand: (1) Teaser (2 days before) — build anticipation, hint at the deals without revealing them, CTA to join the early-access list. (2) Launch day — announce the sale, hero banner with discount code, curated product highlights in a grid, CTA to shop now. (3) Last chance (24 h left) — urgency and scarcity, countdown reminder, best-sellers still in stock, final CTA. Brand tone: exclusive, exciting, fashion-forward. Rich full-width imagery placeholders, bold typography, high-contrast CTAs.">
                <div class="seq-prompt-header">
                  <span class="seq-prompt-tag">Promotional · 3 emails</span>
                  <span class="seq-prompt-check">
                    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </span>
                </div>
                <h3 class="seq-prompt-title">Black Friday Fashion Campaign</h3>
                <p class="seq-prompt-desc">Teaser, launch day, and last-chance emails for a premium fashion e-commerce brand.</p>
              </button>

            </div>

            <div class="field full actions" style="margin-top:1.25rem;">
              <button type="submit" class="btn btn-primary" id="seq-submit" disabled>
                Generate Sequence
                <span id="spinner" class="htmx-indicator spinner"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- ── Dynamic workspace (plan → execution) ── -->
    <div id="workspace"></div>

  </main>

  <footer class="site-footer">
    <div class="container">
      Powered by <strong>Beefree SDK MCP v2</strong> ·
      <strong>PydanticAI</strong> · <strong>FastAPI</strong>
    </div>
  </footer>

  <script>
    /* ── Preset prompt selection ── */
    function selectPrompt(el) {
      document.querySelectorAll('.seq-prompt-card').forEach(function(c) {
        c.classList.remove('seq-prompt-card-selected');
      });
      el.classList.add('seq-prompt-card-selected');
      document.getElementById('goal').value = el.dataset.prompt;
      document.getElementById('preset_id').value = el.dataset.presetId || '';
      document.getElementById('seq-submit').disabled = false;
    }

    /* ── Thumbnail rescaling ── */
    function rescaleThumbs() {
      document.querySelectorAll('.thumb-viewport').forEach(vp => {
        const w = vp.offsetWidth;
        const scale = w / 600;
        const inner = vp.querySelector('.thumb-inner');
        if (inner) inner.style.transform = 'scale(' + scale + ')';
      });
    }
    window.addEventListener('resize', rescaleThumbs);

    /* ── Section collapse ── */
    function toggleCard(card) {
      if (card) card.classList.toggle('is-collapsed');
    }

    document.body.addEventListener('htmx:afterSwap', function(e) {
      setTimeout(rescaleThumbs, 50);
      var tgt = e.detail && e.detail.target;
      if (!tgt) return;

      // Plan appeared → collapse the campaign form
      if (tgt.id === 'workspace') {
        var fs = document.getElementById('form-section');
        if (fs) fs.classList.add('is-collapsed');
      }

      // Execute started → collapse the plan card
      if (tgt.id === 'execution') {
        var pc = document.querySelector('.plan-card');
        if (pc) pc.classList.add('is-collapsed');
      }
    });
  </script>

</body>
</html>
