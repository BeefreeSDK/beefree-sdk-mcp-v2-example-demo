  <main class="container">

    <!-- ── Campaign form ── -->
    <section class="card form-card" id="form-section">
      <div class="card-header-row">
        <h2 class="card-title">Design your campaign</h2>
        <button class="collapse-btn" onclick="toggleCard(this.closest('.card'))" aria-label="Toggle section">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 6l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="card-body">
        <div>
          <form
            hx-post="/plan"
            hx-target="#workspace"
            hx-swap="innerHTML"
            hx-indicator="#spinner"
            onsubmit="return !!document.getElementById('goal').value"
          >
            <input type="hidden" id="goal" name="goal" value="" />
            <input type="hidden" id="preset_id" name="preset_id" value="" />

            <div class="seq-prompt-grid">
              <!-- Preset 1: E-commerce Black Friday -->
              <button type="button" class="seq-prompt-card" onclick="selectPrompt(this)" data-preset-id="black-friday-fashion"
                data-prompt="Campaign: 3-email Black Friday campaign for VAULTURA — a premium fashion e-commerce brand. Brand: VAULTURA · Primary #0A0A0A (jet black) · Accent #F5E642 (electric yellow) · Background #FAFAF8 (near-white) · Font: bold, editorial · Tone: exclusive, high-fashion, urgency-driven. Audience: existing customers and subscribers; fashion-forward, respond strongly to exclusivity and scarcity. Email 1 — Teaser (48 h before launch): build maximum anticipation without revealing the deal; drive early-access sign-ups. Key message: 'Something extraordinary arrives Friday.' CTA: 'Secure Early Access'. Email 2 — Launch day: hero announcement, promo code VAULT30 reveal, curated 3-product grid, maximum urgency. CTA: 'Shop Now'. Email 3 — Last chance (24 h remaining): all-in on urgency and scarcity; showcase 3 best-sellers still in stock, reinforce promo code, drive the final conversion. CTA: 'Shop Before It&apos;s Gone'.">
                <div class="seq-prompt-header">
                  <span class="seq-prompt-tag">Promotional · 3 emails</span>
                  <span class="seq-prompt-check">
                    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </span>
                </div>
                <h3 class="seq-prompt-title">Black Friday Fashion Campaign</h3>
                <p class="seq-prompt-desc">Teaser, launch day, and last-chance emails for VAULTURA — a premium fashion brand.</p>
              </button>

              <!-- Preset 2: SaaS trial nurture -->
              <button type="button" class="seq-prompt-card" onclick="selectPrompt(this)" data-preset-id="saas-trial-nurture"
                data-prompt="Campaign: 4-email trial-to-paid nurture for Taskflow — a B2B project management SaaS (think Asana or Linear). Brand: Taskflow · Primary #1E3A5F (slate blue) · Accent #0EA5E9 (electric blue) · Background #F8FAFC (light grey-white) · Tone: professional, encouraging, results-focused. Audience: free-trial users at mid-size tech companies; signed up but need to form a habit and see ROI. Email 1 — Trial activated (Day 0): welcome + quick-start; make the first meaningful action obvious. CTA: 'Open Your Dashboard'. Email 2 — Day 3 check-in: 3 actionable tips to maximise the trial + 2 short tutorial resources; reduce friction and build a habit. CTA: 'Back to Dashboard'. Email 3 — Day 7 feature spotlight: showcase the single premium feature (Automation) they haven't discovered yet; plant upgrade intent with concrete ROI. CTA: 'Upgrade Now'. Email 4 — Trial ending (Day 14): create urgency, recap what they've built, present a time-limited 20% discount offer. CTA: 'Upgrade Now'.">
                <div class="seq-prompt-header">
                  <span class="seq-prompt-tag">Nurture · 4 emails</span>
                  <span class="seq-prompt-check">
                    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </span>
                </div>
                <h3 class="seq-prompt-title">SaaS Trial-to-Paid Nurture</h3>
                <p class="seq-prompt-desc">4-step sequence converting Taskflow free-trial users into paid subscribers.</p>
              </button>

              <!-- Preset 3: Streaming service onboarding -->
              <button type="button" class="seq-prompt-card" onclick="selectPrompt(this)" data-preset-id="streaming-onboarding"
                data-prompt="Campaign: 3 transactional emails for StreamVault — a premium dark-themed streaming platform. Brand: StreamVault · Primary #1C1C2E (deep navy) · Accent #E94560 (crimson red) · Background #F5F5F0 (off-white) · Font: modern sans-serif · Tone: cinematic, warm, confidence-building. Audience: new subscribers who just created an account. Email 1 — Welcome &amp; account confirmed: celebrate the sign-up, surface the top content genres, drive the very first watch session. Key message: 'Your StreamVault account is ready.' CTA: 'Start Watching Now'. Email 2 — Password reset (purely functional, zero marketing): secure and reassuring, prominent reset CTA, 24-hour expiry notice, ignore-if-not-you note. CTA: 'Reset My Password'. Email 3 — Subscription confirmed: recap the active plan and next billing date, communicate full subscription value (screens, quality, downloads), invite catalogue exploration. CTA: 'Explore the Catalogue'.">
                <div class="seq-prompt-header">
                  <span class="seq-prompt-tag">Transactional · 3 emails</span>
                  <span class="seq-prompt-check">
                    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </span>
                </div>
                <h3 class="seq-prompt-title">Streaming Service Onboarding</h3>
                <p class="seq-prompt-desc">Welcome, password reset, and subscription confirmation for StreamVault — a Netflix-style platform.</p>
              </button>
            </div>

            <div class="field full actions" style="margin-top:1.25rem;">
              <button type="submit" class="btn btn-primary" id="seq-submit" disabled>
                Generate Sequence
                <span id="spinner" class="htmx-indicator spinner"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- ── Dynamic workspace (plan → execution) ── -->
    <div id="workspace"></div>

  </main>

  <footer class="site-footer">
    <div class="container">
      Powered by <strong>Beefree SDK MCP v2</strong> ·
      <strong>PydanticAI</strong> · <strong>FastAPI</strong>
    </div>
  </footer>

  <script>
    /* ── Preset prompt selection ── */
    function selectPrompt(el) {
      document.querySelectorAll('.seq-prompt-card').forEach(function(c) {
        c.classList.remove('seq-prompt-card-selected');
      });
      el.classList.add('seq-prompt-card-selected');
      document.getElementById('goal').value = el.dataset.prompt;
      document.getElementById('preset_id').value = el.dataset.presetId || '';
      document.getElementById('seq-submit').disabled = false;
    }

    /* ── Thumbnail rescaling ── */
    function rescaleThumbs() {
      document.querySelectorAll('.thumb-viewport').forEach(vp => {
        const w = vp.offsetWidth;
        const scale = w / 700;
        const inner = vp.querySelector('.thumb-inner');
        if (inner) inner.style.transform = 'scale(' + scale + ')';
      });
    }
    window.addEventListener('resize', rescaleThumbs);

    /* ── Section collapse ── */
    function toggleCard(card) {
      if (card) card.classList.toggle('is-collapsed');
    }

    document.body.addEventListener('htmx:afterSwap', function(e) {
      setTimeout(rescaleThumbs, 50);
      var tgt = e.detail && e.detail.target;
      if (!tgt) return;

      // Plan appeared → collapse the campaign form
      if (tgt.id === 'workspace') {
        var fs = document.getElementById('form-section');
        if (fs) fs.classList.add('is-collapsed');
      }

      // Execute started → collapse the plan card
      if (tgt.id === 'execution') {
        var pc = document.querySelector('.plan-card');
        if (pc) pc.classList.add('is-collapsed');
      }
    });
  </script>
